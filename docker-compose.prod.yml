version: '3.8'

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8085:8080"
    env_file:
      - .env.prod
    environment:
      - MCP_TRANSPORT=sse
      - MCP_PORT=8080
      - MEMRO_API_URL=${MEMRO_API_URL_PROD:-http://api.memro.co}
      - PYTHONUNBUFFERED=1
    restart: always
